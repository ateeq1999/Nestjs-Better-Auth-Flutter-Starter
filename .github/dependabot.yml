version: 2
updates:
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      firebase:
        patterns: ["firebase_*"]
      bloc:
        patterns: ["bloc", "flutter_bloc", "bloc_test", "hydrated_bloc"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: "ci"
